---

# Each whpg_extension_<name> variable accepts three kinds of values:
#   true   -> install the extension package matching the configured major
#             version (state honours whpg_upgrade)
#   false  -> uninstall the extension package
#   string -> install the exact RPM identified by the string (NVR, NEVRA,
#             package file path, or any spec dnf accepts). The string is
#             passed verbatim to dnf with state=present so the requested
#             version is installed, upgraded, or downgraded as needed.

- name: Gather installed package facts
  ansible.builtin.package_facts:
    manager: auto
  become: true
  become_user: root


- name: Install and purge warehouse-pg extension packages
  when: whpg_install_packages | bool
  block:

    ######################################################################
    # Extension: diskquota
    # Variable name: whpg_extension_diskquota

    - name: Install diskquota extension
      ansible.builtin.dnf:
        name: >-
          {{ whpg_extension_diskquota if whpg_extension_diskquota is string
             else 'edb-whpg' ~ whpg_major_version ~ '-diskquota' }}
        state: "{{ 'present' if whpg_extension_diskquota is string else _whpg_dnf_state }}"
      become: true
      become_user: root
      timeout: "{{ DNF_TIMEOUT }}"
      when:
        - whpg_extension_diskquota is string
          or (whpg_extension_diskquota is boolean and whpg_extension_diskquota)
        - whpg_major_version | int in [6, 7]
        - whpg_extension_diskquota is string
          or ("edb-whpg" ~ whpg_major_version ~ "-diskquota") not in ansible_facts.packages
          or whpg_upgrade == "always-upgrade-to-latest-minor"

    - name: Purge diskquota extension
      ansible.builtin.dnf:
        name: "edb-whpg{{ whpg_major_version }}-diskquota"
        state: absent
      become: true
      become_user: root
      timeout: "{{ DNF_TIMEOUT }}"
      when:
        - whpg_extension_diskquota is boolean
        - not whpg_extension_diskquota
        - whpg_major_version | int in [6, 7]
        - ("edb-whpg" ~ whpg_major_version ~ "-diskquota") in ansible_facts.packages


