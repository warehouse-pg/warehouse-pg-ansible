  block:

    - name: Fail if diskquota extension is not installed
      ansible.builtin.fail:
        msg: >-
          Extension package 'edb-whpg{{ whpg_major_version }}-diskquota' is not
          installed and whpg_install_packages is false. Install the package
          manually, or set whpg_install_packages to true.
      when:
        - whpg_extension_diskquota is string
          or (whpg_extension_diskquota is boolean and whpg_extension_diskquota)
        - whpg_major_version | int in [6, 7]
        - ("edb-whpg" ~ whpg_major_version ~ "-diskquota") not in ansible_facts.packages

    - name: Fail if fts-enhanced extension is not installed
